<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Beshoy Hany</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f0f0f0;
            margin: 0;
            padding: 20px;
        }
        .box {
            max-width: 600px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        button {
            background: red;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
        }
        .hidden { display: none; }
        .msg {
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
        }
        .success { background: #d4edda; color: green; }
        .error { background: #f8d7da; color: red; }
        img { max-width: 100%; border-radius: 10px; margin: 10px 0; }
    </style>
</head>
<body>

<div class="box" id="loginBox">
    <h2>Admin Login</h2>
    <input type="password" id="password" placeholder="Enter Password">
    <button onclick="login()">Login</button>
    <div id="loginMsg"></div>
</div>

<div class="box hidden" id="adminBox">
    <button onclick="logout()" style="background: #333; margin-bottom: 20px;">Logout</button>
    <div id="msg"></div>
    
    <h3>Hero Section</h3>
    <input type="text" id="heroTitle" placeholder="Title">
    <input type="text" id="heroSubtitle" placeholder="Subtitle">
    <textarea id="heroDesc" placeholder="Description" rows="3"></textarea>
    
    <h3>About Section</h3>
    <input type="text" id="aboutHeadline" placeholder="Headline">
    <textarea id="aboutText" placeholder="About text" rows="4"></textarea>
    
    <h3>Contact</h3>
    <input type="text" id="contactWhatsapp" placeholder="WhatsApp">
    <input type="text" id="contactEmail" placeholder="Email">
    <input type="text" id="contactPhone" placeholder="Phone">
    
    <h3>Profile Photo</h3>
    <img id="preview" src="">
    <input type="file" id="photoInput" accept="image/*">
    
    <button onclick="saveData()">💾 SAVE ALL CHANGES</button>
</div>

<script>
    // ========== إعداداتك - غيرها هنا ==========
    const ADMIN_PASS = "Bb1.2.2005@";
    const GITHUB_USER = "beshofocus204-ux";  // غير هذا
    const GITHUB_REPO = "beshofocus-B-W";         // غير هذا
    const GITHUB_TOKEN = "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";   // حط التوكن هنا مرة واحدة
    // ===========================================
    
    let currentPhoto = null;
    
    function login() {
        const pwd = document.getElementById('password').value;
        if (pwd === ADMIN_PASS) {
            document.getElementById('loginBox').classList.add('hidden');
            document.getElementById('adminBox').classList.remove('hidden');
            loadData();
        } else {
            document.getElementById('loginMsg').innerHTML = '<div class="msg error">Wrong password!</div>';
        }
    }
    
    function logout() {
        document.getElementById('loginBox').classList.remove('hidden');
        document.getElementById('adminBox').classList.add('hidden');
        document.getElementById('password').value = '';
    }
    
    async function loadData() {
        try {
            const res = await fetch(`https://raw.githubusercontent.com/beshofocus204-ux/beshofocus-B-W/blob/main/data.json?t=${Date.now()}`);
            const data = await res.json();
            document.getElementById('heroTitle').value = data.hero?.title || '';
            document.getElementById('heroSubtitle').value = data.hero?.subtitle || '';
            document.getElementById('heroDesc').value = data.hero?.desc || '';
            document.getElementById('aboutHeadline').value = data.about?.headline || '';
            document.getElementById('aboutText').value = data.about?.text || '';
            document.getElementById('contactWhatsapp').value = data.contact?.whatsapp || '';
            document.getElementById('contactEmail').value = data.contact?.email || '';
            document.getElementById('contactPhone').value = data.contact?.phone || '';
            if (data.photo) {
                document.getElementById('preview').src = data.photo;
                currentPhoto = data.photo;
            }
        } catch(e) {
            console.log('Error loading');
        }
    }
    
    document.getElementById('photoInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(ev) {
                currentPhoto = ev.target.result;
                document.getElementById('preview').src = currentPhoto;
                showMsg('Photo loaded! Click Save', 'success');
            };
            reader.readAsDataURL(file);
        }
    });
    
    function showMsg(text, type) {
        const msgDiv = document.getElementById('msg');
        msgDiv.innerHTML = `<div class="msg ${type}">${text}</div>`;
        setTimeout(() => msgDiv.innerHTML = '', 3000);
    }
    
    async function saveData() {
        showMsg('Saving...', 'success');
        
        const data = {
            hero: {
                title: document.getElementById('heroTitle').value,
                subtitle: document.getElementById('heroSubtitle').value,
                desc: document.getElementById('heroDesc').value
            },
            about: {
                headline: document.getElementById('aboutHeadline').value,
                text: document.getElementById('aboutText').value
            },
            contact: {
                whatsapp: document.getElementById('contactWhatsapp').value,
                email: document.getElementById('contactEmail').value,
                phone: document.getElementById('contactPhone').value
            },
            photo: currentPhoto || '/my-photo.png'
        };
        
        try {
            // Get current file SHA
            const fileRes = await fetch(`https://github.com/beshofocus204-ux/beshofocus-B-W/blob/main/data.json`, {
                headers: { 'Authorization': `token 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` }
            });
            
            let sha = null;
            if (fileRes.ok) {
                const fileData = await fileRes.json();
                sha = fileData.sha;
            }
            
            // Save to GitHub
            const content = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
            const saveRes = await fetch(`https://github.com/beshofocus204-ux/beshofocus-B-W/blob/main/data.json`, {
                method: 'PUT',
                headers: {
                    'Authorization': `token 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`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    message: 'Update website content',
                    content: content,
                    sha: sha
                })
            });
            
            if (saveRes.ok) {
                showMsg('✅ SAVED! Website will update in 1 minute', 'success');
            } else {
                const err = await saveRes.json();
                showMsg('Error: ' + err.message, 'error');
            }
        } catch(e) {
            showMsg('Error: ' + e.message, 'error');
        }
    }
</script>

</body>
</html>

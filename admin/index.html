<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Poppins', sans-serif;
      background: #f0f0f0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .container {
      background: white;
      padding: 40px;
      border-radius: 20px;
      width: 500px;
      max-width: 90%;
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
    }
    h1 { margin-bottom: 30px; color: #ff0000; }
    input, textarea {
      width: 100%;
      padding: 12px;
      margin: 10px 0 20px;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-family: inherit;
    }
    textarea { min-height: 100px; }
    button {
      background: #ff0000;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      width: 100%;
    }
    button:hover { background: #cc0000; }
    .hidden { display: none; }
    .message {
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
      display: none;
    }
    .success { background: #d4edda; color: #155724; }
    .error { background: #f8d7da; color: #721c24; }
    .github-token {
      background: #f8f9fa;
      padding: 15px;
      border-radius: 8px;
      margin: 20px 0;
      font-size: 12px;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>🔐 Admin Panel</h1>
  
  <!-- Login Form -->
  <div id="loginForm">
    <p style="margin-bottom: 20px;">Enter your secret key to continue</p>
    <input type="password" id="secretKey" placeholder="Secret Key">
    <button onclick="verifyLogin()">Login</button>
    <div id="loginMsg" class="message"></div>
  </div>
  
  <!-- Admin Dashboard -->
  <div id="adminPanel" class="hidden">
    <h2>✏️ Edit Content</h2>
    
    <div id="updateMsg" class="message"></div>
    
    <h3>Hero Section</h3>
    <input type="text" id="heroTitle" placeholder="Title">
    <input type="text" id="heroSubtitle" placeholder="Subtitle">
    <textarea id="heroDesc" placeholder="Description"></textarea>
    
    <h3>About Section</h3>
    <input type="text" id="aboutHeadline" placeholder="Headline">
    <textarea id="aboutText" placeholder="About text"></textarea>
    
    <h3>Contact</h3>
    <input type="text" id="contactWhatsapp" placeholder="WhatsApp">
    <input type="text" id="contactEmail" placeholder="Email">
    <input type="text" id="contactPhone" placeholder="Phone">
    
    <h3>Profile Photo URL</h3>
    <input type="text" id="photoUrl" placeholder="/my-photo.png">
    
    <button onclick="saveToGitHub()">💾 Save & Publish to Website</button>
    
    <div class="github-token">
      <small>⚠️ You need a GitHub token to save changes. <br>
      Get one at: <a href="https://github.com/settings/tokens" target="_blank">GitHub Tokens</a><br>
      Select: 'repo' scope</small>
    </div>
  </div>
</div>

<script>
  // YOUR SECRET KEY - Only you know this!
  const SECRET_KEY = "BeshoySecret2026";
  
  // GitHub settings (replace with your info)
  const GITHUB_USERNAME = "YOUR_USERNAME";  // غيّر هذا
  const GITHUB_REPO = "YOUR_REPO_NAME";     // غيّر هذا
  const GITHUB_PATH = "data.json";
  
  function verifyLogin() {
    const key = document.getElementById('secretKey').value;
    if (key === SECRET_KEY) {
      document.getElementById('loginForm').style.display = 'none';
      document.getElementById('adminPanel').classList.remove('hidden');
      loadCurrentData();
      showMessage('loginMsg', '✅ Logged in successfully!', 'success');
    } else {
      showMessage('loginMsg', '❌ Wrong secret key!', 'error');
    }
  }
  
  function showMessage(elementId, msg, type) {
    const el = document.getElementById(elementId);
    el.textContent = msg;
    el.className = `message ${type}`;
    el.style.display = 'block';
    setTimeout(() => {
      el.style.display = 'none';
    }, 3000);
  }
  
  async function loadCurrentData() {
    try {
      const response = await fetch(`/data.json?t=${Date.now()}`);
      const data = await response.json();
      
      document.getElementById('heroTitle').value = data.hero?.title || '';
      document.getElementById('heroSubtitle').value = data.hero?.subtitle || '';
      document.getElementById('heroDesc').value = data.hero?.desc || '';
      document.getElementById('aboutHeadline').value = data.about?.headline || '';
      document.getElementById('aboutText').value = data.about?.text || '';
      document.getElementById('contactWhatsapp').value = data.contact?.whatsapp || '';
      document.getElementById('contactEmail').value = data.contact?.email || '';
      document.getElementById('contactPhone').value = data.contact?.phone || '';
      document.getElementById('photoUrl').value = data.photo || '/my-photo.png';
    } catch(e) {
      console.log('Error loading data');
    }
  }
  
  async function saveToGitHub() {
    const token = prompt('Enter your GitHub Personal Access Token:');
    if (!token) return;
    
    const newData = {
      hero: {
        title: document.getElementById('heroTitle').value,
        subtitle: document.getElementById('heroSubtitle').value,
        desc: document.getElementById('heroDesc').value
      },
      about: {
        headline: document.getElementById('aboutHeadline').value,
        text: document.getElementById('aboutText').value
      },
      contact: {
        whatsapp: document.getElementById('contactWhatsapp').value,
        email: document.getElementById('contactEmail').value,
        phone: document.getElementById('contactPhone').value
      },
      photo: document.getElementById('photoUrl').value
    };
    
    try {
      // Get current file SHA
      const fileResponse = await fetch(`https://api.github.com/repos/${GITHUB_USERNAME}/${GITHUB_REPO}/contents/${GITHUB_PATH}`, {
        headers: { 'Authorization': `token ${token}` }
      });
      const fileData = await fileResponse.json();
      const sha = fileData.sha;
      
      // Update file
      const updateResponse = await fetch(`https://api.github.com/repos/${GITHUB_USERNAME}/${GITHUB_REPO}/contents/${GITHUB_PATH}`, {
        method: 'PUT',
        headers: {
          'Authorization': `token ${token}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          message: 'Update website content via admin panel',
          content: btoa(unescape(encodeURIComponent(JSON.stringify(newData, null, 2)))),
          sha: sha
        })
      });
      
      if (updateResponse.ok) {
        showMessage('updateMsg', '✅ Published successfully! Website will update in 1-2 minutes', 'success');
        setTimeout(() => location.reload(), 2000);
      } else {
        showMessage('updateMsg', '❌ Error saving! Check your token', 'error');
      }
    } catch(e) {
      showMessage('updateMsg', '❌ Error: ' + e.message, 'error');
    }
  }
</script>

</body>
</html>

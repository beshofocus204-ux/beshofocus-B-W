<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Besho Focus | Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;900&family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="minimal-theme">
  <div class="bg-blur-overlay"></div>

  <header>
    <div class="logo">Besho <span class="red-dot">Focus</span></div>
    <nav class="nav-links">
      <a href="#services" data-en="Services" data-ar="الخدمات">Services</a>
      <a href="#projects" data-en="Work" data-ar="الأعمال">Work</a>
      <a href="#about" data-en="About" data-ar="عنّا">About</a>
    </nav>
    <div class="controls">
      <div class="lang-btn" id="langToggle">AR</div>
      <a href="/admin/" class="admin-btn">Admin</a>
    </div>
  </header>

  <main>
    <!-- Hero Section -->
    <section id="hero" class="hero section-focus">
      <div class="hero-container">
        <div class="hero-left">
          <div class="hero-img-wrapper">
            <!-- حط صورتك هنا وسميها my-photo.jpg واعملها ابيض واسود -->
            <img src="my-photo.png" alt="Besho Focus" class="bw-img">
          </div>
        </div>
        <div class="hero-right">
          <h1 class="main-title">Besho <span class="red-text">Focus</span></h1>
          <h2 class="sub-title" data-en="Portfolio" data-ar="بورتفوليو">Portfolio</h2>
          <p class="hero-desc" data-en="Social Media Designer & Visual Artist" data-ar="مصمم سوشيال ميديا وفنان بصري">Social Media Designer & Visual Artist</p>
          <a href="#projects" class="red-btn" data-en="View Work" data-ar="شاهد أعمالي">View Work</a>
        </div>
      </div>
    </section>

    <!-- Services Section -->
    <section id="services" class="section-focus">
      <h3 class="section-label"><span class="red-line"></span> <span data-en="Services" data-ar="الخدمات">Services</span></h3>
      <div class="services-list">
        <div class="service-item">
          <span class="service-num">01</span>
          <h4 data-en="Social Media Design" data-ar="تصميم السوشيال ميديا">Social Media Design</h4>
        </div>
        <div class="service-item">
          <span class="service-num">02</span>
          <h4 data-en="Brand Identity" data-ar="الهوية البصرية">Brand Identity</h4>
        </div>
        <div class="service-item">
          <span class="service-num">03</span>
          <h4 data-en="Ad Creatives" data-ar="تصاميم الإعلانات">Ad Creatives</h4>
        </div>
      </div>
    </section>

    <!-- Projects Section -->
    <section id="projects" class="section-focus">
      <h3 class="section-label"><span class="red-line"></span> <span data-en="Featured Work" data-ar="أعمال مختارة">Featured Work</span></h3>
      <div id="projects-container" class="projects-minimal-grid">
        <!-- المشاريع هتنزل هنا من الـ CMS -->
      </div>
    </section>

    <!-- About Section -->
    <section id="about" class="section-focus">
      <div class="about-content">
        <h3 class="section-label"><span class="red-line"></span> <span data-en="About" data-ar="عنّا">About</span></h3>
        <p data-en="Minimalist designer focused on creating clean, impactful visual stories for modern brands." 
           data-ar="مصمم مينيماليست يركز على خلق قصص بصرية نظيفة ومؤثرة للعلامات التجارية الحديثة.">
        </p>
      </div>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 Besho Focus. <span class="red-text">Less is more.</span></p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
